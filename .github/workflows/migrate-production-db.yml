name: Migrate production database

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-db-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Drizzle migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check database secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL_UNPOOLED:-}" ]; then
            echo "::error::Missing GitHub secret DATABASE_URL_UNPOOLED. It must contain the direct Neon connection string, not the pooled URL."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npm run db:migrate
